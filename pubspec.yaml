name: krypton
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  # Banco de dados
  drift: ^2.34.0
  sqlite3_flutter_libs: ^0.6.0+eol   # bundla o sqlite3 nativo (Android/iOS/Windows/macOS/Linux)
  path_provider: ^2.1.0
  path: "1.9.1"

  # Criptografia
  cryptography: "2.9.0"
  cryptography_flutter: ^2.3.4

  # Armazenamento
  shared_preferences: "2.5.5"
  flutter_secure_storage: "10.3.1"

  # Autenticação
  local_auth: "3.0.1"

  # Utilitários
  url_launcher: "6.3.2"

  image_picker: ^1.1.2

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  drift_dev: ^2.34.0
  build_runner: ^2.4.0
  flutter_launcher_icons: ^0.14.4

# Hook que substitui o SQLite padrão pelo SQLite3MultipleCiphers
# Habilita criptografia nativa em Android, iOS, Windows, macOS e Linux
hooks:
  user_defines:
    sqlite3:
      source: sqlite3mc

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "lib/images/logo_app.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - lib/images/